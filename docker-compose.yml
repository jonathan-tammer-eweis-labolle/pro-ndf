services:
  claude-code:
    build: .
    image: pro-ndf-claude:latest
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace                  # project source (edits persist to host)
      - claude-config:/root/.claude   # Claude auth + memory (isolated from host)
    working_dir: /workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  claude-config:
